<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de $MXN a $USD</title>
    <link rel="stylesheet" href="css/ejercicio11.css">
    <script src="js/ejercicio12.js"></script>
</head>
<body>

    <div class="contenedor">
        <h2>Calculadora de $MXN a $USD</h2>
        
        <div class="grupo-formulario">
            <label for="mxn">MXN:</label>
            <input type="number" id="MXN" placeholder="Ej. 25">
        </div>

        <div class="grupo-formulario">
            <button onclick="convertir()">Convertir</button>
        </div>

        <div class="grupo-formulario">
            <label for="USD">USD:</label>
            <input type="text" id="USD" readonly placeholder="Resultado">
        </div>
    </div>

</body>
</html>

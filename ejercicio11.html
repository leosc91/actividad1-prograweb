<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de distancia</title>
    <link rel="stylesheet" href="css/ejercicio11.css">
    <script src="js/ejercicio11.js"></script>
</head>
<body>

    <div class="contenedor">
        <h2>Calculadora de Kilometros a Millas</h2>
        
        <div class="grupo-formulario">
            <label for="kilometros">Kilometros:</label>
            <input type="number" id="kilometros" placeholder="Ej. 25" min="1" pattern="^[0-9]+">
        </div>

        <div class="grupo-formulario">
            <button onclick="convertir()">Convertir</button>
        </div>

        <div class="grupo-formulario">
            <label for="millas">Millas:</label>
            <input type="text" id="millas" readonly placeholder="Resultado">
        </div>
    </div>

</body>
</html>

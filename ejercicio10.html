<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Temperatura</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
    <script src="js/ejercicio10.js"></script>
</head>
<body>

    <div class="contenedor">
        <h2>Calculadora de Grados</h2>
        
        <div class="grupo-formulario">
            <label for="celsius">Grados Celsius:</label>
            <input type="text" id="celsius" placeholder="Ej. 25">
        </div>

        <div class="grupo-formulario">
            <button onclick="convertir()">Convertir</button>
        </div>

        <div class="grupo-formulario">
            <label for="fahrenheit">Grados Fahrenheit:</label>
            <input type="text" id="fahrenheit" readonly placeholder="Resultado">
        </div>
    </div>

</body>
</html>
